spring:
  application:
    name: loans

  profiles:
    active: dev

  config:
    import: "optional:configserver:http://localhost:8888/"

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics

  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

  tracing:
    enabled: true
    sampling:
      probability: 1

logging:
  file:
    name: logs/loans.log