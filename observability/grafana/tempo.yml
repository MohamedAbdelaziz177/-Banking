server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    # Zipkin receiver (if using Spring Cloud Sleuth/Zipkin)
    zipkin:
      endpoint: 0.0.0.0:9411

    # OTLP receivers (recommended for modern apps)
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

    # # Jaeger receivers (if needed)
    # jaeger:
    #   protocols:
    #     thrift_http:
    #       endpoint: 0.0.0.0:14268
    #     grpc:
    #       endpoint: 0.0.0.0:14250

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
      generate_native_histograms: both

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: microservices-cluster
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

  # Generate service graph metrics
  processor:
    service_graphs:
      dimensions:
        - service
        - tier
    span_metrics:
      dimensions:
        - service
        - http.method
        - http.status_code